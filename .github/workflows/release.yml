name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-artifacts
          path: |
            client/src-tauri/target/release/bundle/deb/*.deb
            client/src-tauri/target/release/bundle/rpm/*.rpm
            client/src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-artifacts
          path: |
            client/src-tauri/target/release/bundle/msi/*.msi
            client/src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;27.0.12077973" "build-tools;34.0.0" "platforms;android-34"
        working-directory: .

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Init Tauri Android
        run: pnpm tauri android init

      - name: Build Android APK
        run: pnpm tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/bank-monitor-release.jks
        working-directory: .

      - name: Sign APK
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" -path "*/release/*" | head -1)
          if [ -n "$APK" ]; then
            ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
              --ks /tmp/bank-monitor-release.jks \
              --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
              "$APK"
          fi

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Rename APK
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" -path "*/release/*" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "bank-monitor-${{ steps.version.outputs.version }}.apk"
          fi

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v5
        with:
          name: android-artifacts
          path: "client/*.apk"

  release:
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Delete existing release
        run: gh release delete "${{ steps.version.outputs.version }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Bank Monitor ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            artifacts/linux-artifacts/**/*
            artifacts/windows-artifacts/**/*
            artifacts/android-artifacts/*.apk
          generate_release_notes: true
